<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Generator</title>
    <link rel="stylesheet" href="password.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="body">


<div class="main-container">
    <div class="roww">
    <h1>Password Generator</h1>
   
    <div class="inputBox">
        <input type="text" class="passBox" id="passBox">
    </div>
    <input type="range" min="1" max="30" value="8"  class="range inputSlider">

        <div class="pass-span">
    <p>Password Length</p>
    <span id="sliderValue"></span>
        </div>
   
        <div class="labeling">
        <label  for="lowercase">Include LowerCase Letters (a-z) </label>
    <input type="checkbox" name="Lowercase" id="lowercase"> </div><br>
          
      <label  for="Numbers">Include decimals Numbers  (0-9) </label>
    <input type="checkbox" name="LowerCase" id="Numbers">
    <br>
          
      <label  for="Symbols">Include  Unique  Symbols  (@ - #)   </label>
    <input type="checkbox" name="checkbox" id="Symbols">
          
      <label  for="uppercase">Include CapitalCase Letters (a-z) </label>
    <input type="checkbox" name="uppercase" id="uppercase">
        </div>
        <button class="genBtn" id="genBtn">Generate Password</button>
</div>














    <script src="password.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
