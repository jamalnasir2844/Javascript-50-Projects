<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    
<h2 class="title">
    Spli <br>trer
</h2>
    <div class="card">
        <div class="card-container">
            <div class="inputs-section">
                <div class="bill-sec">
                    <label for="bill">bill</label>
                <div class="bill-input">
                    <input type="text" placeholder="0" id="bill">
                    <i class="fa-solid fa-dollar-sign" style="color: rgb(99, 230, 190);"></i>
                </div>
                </div>
                <div class="tip-sec">
                    <label for="tip">Select tip %</label>
                <div class="tip-btns">
                    <div>
                <button>5%</button>
                <button>10%</button>
                <button>15%</button>
                </div>
                <div>
                <button>25%</button>
                <button>50%</button>
                <input type="number" placeholder="Custom" id="custom">
                    </div>
                   </div>
                <div class="people-sec">
                    <label for="people">Number of People</label>
                    <div class="people-input">
                        <input type="text" placeholder="0" id="people">
                        <i class="fa-solid fa-person-breastfeeding" style="color: rgb(167, 154, 107);"></i>
                    </div>
                </div>
                </div>
                </div>
                <div class="outputs-section">
                    <div class="tip-amount">
                        <p>Tip Amount <br> <span>/Person</span> </p>
                        <h2 id="tipAmount">$0.00</h2>
                    </div>
                    <div class="total">
                        <p>Total <br> <span>/person</span></p>
                        <h2 id="total">$0.00</h2>
                    </div>
                    <button class="reset-btn" id="resetBtn">Reset</button>
                </div>
            
        </div>
    </div>











    <script src="script.js"></script>
</body>
</html>
