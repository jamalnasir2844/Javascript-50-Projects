<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body style="background-color: rgb(61, 60, 60); color: white;">
    
    <h1 >Image Slider</h1>
    <div class="container">
        <img src="left.png"  class="arrow left" alt="" style="height: 150px; width: 150px;">
        <div class="frame">
            <div class="slider">
                <img src="image1.jpg"  alt="" class="image" >
                <img src="image2.jpg" alt="" class="image">
                <img src="image3.jpg" alt="" class="image">
                <img src="image4.jpg" alt="" class="image">
            </div>
             </div>
            <img src="right.png"  class="arrow right" style="height: 150px; width: 150px;">
       
    </div>









    <script src="script.js"></script>
</body>
</html>
